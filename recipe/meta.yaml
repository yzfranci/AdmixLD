{% set version = "0.10.0" %}
{% set commit = "0233d51fd88e752a279a242f50656dd50e65eb98" %}

package:
  name: admixld
  version: {{ version }}

source:
  url: https://github.com/yzfranci/AdmixLD/archive/{{ commit }}.tar.gz
  sha256: 90627aaa7827a5981162dfa82946c191ab2fc906dcbe9c9cb7211e34c09dede1

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('admixld', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake >=3.16
    - make
  host:
    - htslib
    - eigen
    - libgomp      # [linux]
    - llvm-openmp  # [osx]
  run:
    - htslib

test:
  commands:
    - admixld --help

about:
  home: https://github.com/yzfranci/AdmixLD
  license: MIT
  license_file: LICENSE
  summary: Fast genome-scale inference of ancestry disequilibrium in hybrid zones.

extra:
  recipe-maintainers:
    - yzfranci
